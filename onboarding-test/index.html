<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enterprise OS | Onboarding Sandbox</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #07080d;
      color: #f5f7fb;
    }
    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }
    aside {
      border-right: 1px solid rgba(255,255,255,.08);
      padding: 24px;
      background: rgba(255,255,255,.03);
    }
    main { padding: 32px; }
    .logo {
      font-size: 14px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #9aa4b2;
      margin-bottom: 32px;
    }
    .nav-item {
      padding: 12px 14px;
      border-radius: 14px;
      color: #c9d1df;
      margin-bottom: 8px;
      background: rgba(255,255,255,.04);
    }
    .nav-item.active {
      background: linear-gradient(135deg, rgba(120,119,255,.25), rgba(0,212,255,.15));
      color: white;
      border: 1px solid rgba(255,255,255,.12);
    }
    .hero {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
      margin-bottom: 28px;
    }
    h1 {
      margin: 0;
      font-size: 42px;
      letter-spacing: -0.04em;
    }
    .subtitle {
      color: #a7b0c0;
      max-width: 780px;
      line-height: 1.6;
      margin-top: 12px;
    }
    .search {
      width: 340px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: white;
      border-radius: 16px;
      padding: 14px 16px;
      outline: none;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
    }
    .card {
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .span-4 { grid-column: span 4; }
    .span-6 { grid-column: span 6; }
    .span-8 { grid-column: span 8; }
    .span-12 { grid-column: span 12; }
    .label {
      font-size: 12px;
      color: #8f9bad;
      text-transform: uppercase;
      letter-spacing: .12em;
      margin-bottom: 10px;
    }
    h2, h3 { margin: 0 0 14px; }
    .pill {
      display: inline-block;
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.08);
      margin: 5px 5px 0 0;
      color: #d9e0ee;
      font-size: 13px;
    }
    .state {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.04);
      margin-bottom: 10px;
    }
    .arrow { color: #7dd3fc; }
    .small { color: #a7b0c0; font-size: 13px; line-height: 1.5; }
    ul { padding-left: 18px; margin: 0; color: #d9e0ee; line-height: 1.8; }
    .checklist {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    .check-card {
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.075);
      border-radius: 18px;
      padding: 16px;
    }
    .risk {
      color: #fecaca;
      background: rgba(239,68,68,.08);
      border-color: rgba(239,68,68,.18);
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      aside { display: none; }
      .hero { flex-direction: column; }
      .search { width: 100%; }
      .span-4, .span-6, .span-8, .span-12 { grid-column: span 12; }
      .checklist { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="logo">Enterprise OS</div>
      <div class="nav-item">Home</div>
      <div class="nav-item active">Process Browser</div>
      <div class="nav-item">Domain / Area View</div>
      <div class="nav-item">CEO View</div>
      <div class="nav-item">My Tasks</div>
      <div class="nav-item">Approvals</div>
    </aside>

    <main>
      <section class="hero">
        <div>
          <div class="label">Sandbox Process</div>
          <h1 id="processName">Loading...</h1>
          <p class="subtitle" id="processGoal"></p>
        </div>
        <input class="search" id="search" placeholder="Search onboarding, Bamboo, HR, training..." />
      </section>

      <section class="grid" id="content"></section>
    </main>
  </div>

  <script>
    async function loadProcess() {
      const response = await fetch('./onboarding.json');
      const data = await response.json();

      document.getElementById('processName').textContent = data.process.name;
      document.getElementById('processGoal').textContent =
        `${data.process.domain} process triggered by "${data.process.trigger}". Goal: ${data.process.goal}.`;

      render(data);

      document.getElementById('search').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        if (!q || JSON.stringify(data).toLowerCase().includes(q)) {
          render(data);
        } else {
          document.getElementById('content').innerHTML = `
            <div class="card span-12">
              <h2>No results found</h2>
              <p class="small">Try searching: onboarding, Bamboo, DocuSign, HR, IT, training, laptop, access.</p>
            </div>
          `;
        }
      });
    }

    function render(data) {
      const subprocesses = data.subprocesses.map(sp => `
        <div class="card span-4">
          <div class="label">Subprocess</div>
          <h3>${sp.name}</h3>
          <ul>${sp.tasks.map(t => `<li>${t}</li>`).join('')}</ul>
        </div>
      `).join('');

      const states = data.state_machine.map(s => `
        <div class="state">
          <div>
            <strong>${s.state}</strong>
            <div class="small">${s.trigger}</div>
          </div>
          <div class="arrow">→</div>
          <div>
            <strong>${s.next_state}</strong>
            <div class="small">${s.action} · Owner: ${s.owner}</div>
          </div>
        </div>
      `).join('');

      const checklists = Object.entries(data.checklists).map(([role, items]) => `
        <div class="check-card">
          <h3>${role}</h3>
          <ul>${items.map(i => `<li>☐ ${i}</li>`).join('')}</ul>
        </div>
      `).join('');

      document.getElementById('content').innerHTML = `
        <div class="card span-4">
          <div class="label">Process</div>
          <h2>${data.process.name}</h2>
          <p class="small"><strong>Trigger:</strong> ${data.process.trigger}</p>
          <p class="small"><strong>Domain:</strong> ${data.process.domain}</p>
        </div>

        <div class="card span-4">
          <div class="label">Systems</div>
          <h2>Connected Tools</h2>
          ${data.systems.map(s => `<span class="pill">${s}</span>`).join('')}
        </div>

        <div class="card span-4 risk">
          <div class="label">Risk Alerts</div>
          <h2>What can go wrong</h2>
          <ul>${data.risks.map(r => `<li>${r}</li>`).join('')}</ul>
        </div>

        <div class="card span-12">
          <div class="label">State Machine</div>
          <h2>Critical Route</h2>
          ${states}
        </div>

        <div class="card span-12">
          <div class="label">Role-Based Execution</div>
          <h2>Checklists</h2>
          <div class="checklist">${checklists}</div>
        </div>

        ${subprocesses}
      `;
    }

    loadProcess().catch(err => {
      document.getElementById('content').innerHTML = `
        <div class="card span-12">
          <h2>Error loading onboarding.json</h2>
          <p class="small">${err.message}</p>
        </div>
      `;
    });
  </script>
</body>
</html>
